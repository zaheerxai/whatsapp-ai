services:
  - type: web
    name: whatsapp-ai-agent
    env: node
    plan: standard
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.puppeteer
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /opt/render/project/src/.puppeteer/linux-1409704/chrome-linux/chrome
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: 'false'
    
    # System packages required for Puppeteer/Chromium
    buildpacks:
      - url: https://github.com/render-examples/puppeteer-render-buildpack.git
